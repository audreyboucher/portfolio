<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&family=Poppins:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
  </head>
  <body style="margin:0;padding:40px;background:#11131D;font-family:Poppins,Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;">
      <tbody>
        <tr style="border:2px solid #007AFF;display:block;">
          <td width="80" height="80" style="background:#007AFF;">
            <img src="{{logo}}" alt="Logo" width="50" height="50" style="display:block;margin:0 auto;">
          </td>
          <td width="20"></td>
          <td style="background:#12131A;color:#FFFFFF;text-align:center;">
            <h1 style="margin:0;font-size:32px;font-weight:600;">AUDREY B.</h1>
          </td>
        </tr>
      </tbody>
    </table>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background:#0A0C12;color:#FFFFFF;font-size:20px;">
      <tbody>
        <tr height="100">
          <td colspan="3"></td>
        </tr>
        <tr>
          <td width="40"></td>
          <td>
            <p style="margin:0;">{{paragraphs.0}} <a href="https://audreyboucher.dev" style="color:#007AFF;">audreyboucher.dev</a></p>
            <p style="margin:0;">{{paragraphs.1}}</p>
          </td>
          <td width="40"></td>
        </tr>
        <tr height="20">
          <td colspan="3"></td>
        </tr>
        <tr>
          <td width="40"></td>
          <td>
            <p style="margin:0;">{{paragraphs.2}}</p>
          </td>
          <td width="40"></td>
        </tr>
        <tr height="20">
          <td colspan="3"></td>
        </tr>
        <tr>
          <td width="40"></td>
          <td>
            <p style="margin:0;text-transform:uppercase;">{{fields.name}} <span style="color:#007AFF;">{{name}}</span></p>
            <p style="margin:0;text-transform:uppercase;">{{fields.email}} <span style="color:#007AFF;">{{email}}</span></p>
          </td>
          <td width="40"></td>
        </tr>
        <tr height="70">
          <td colspan="3"></td>
        </tr>
      </tbody>
    </table>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background:#0A0C12;color:#FFFFFF;font-size:20px;">
      <tbody>
        <tr style="display:block;">
          <td width="40"></td>
          <td colspan="3" style="display:block;margin-left:60px;height:0;">
            <span style="display:inline-block;font-family:Jaro,sans-serif;font-size:148px;line-height:60px;color:#007AFF;">“</span>
          </td>
          <td width="40"></td>
        </tr>
        <tr height="50" style="display:block;">
          <td width="40"></td>
          <td colspan="3" style="background:#11131D;width:520px;height:50px;"></td>
          <td width="40"></td>
        </tr>
        <tr style="display:block;">
          <td width="40" style="width:40px;"></td>
          <td width="30" style="background:#11131D;"></td>
          <td style="background:#11131D;width:460px;">
            <p style="margin:0;font-size:16px;">{{message}}</p>
          </td>
          <td width="30" style="background:#11131D;"></td>
          <td width="40" style="width:40px;"></td>
        </tr>
        <tr height="50" style="display:block;">
          <td width="40"></td>
          <td colspan="3" style="background:#11131D;width:520px;height:50px;"></td>
          <td width="40"></td>
        </tr>
        <tr style="display:block;">
          <td width="40"></td>
          <td colspan="3" style="display:block;margin-right:60px;height:0;text-align:right;">
            <span style="display:inline-block;font-family:Jaro,sans-serif;font-size:148px;line-height:60px;color:#007AFF;">”</span>
          </td>
          <td width="40"></td>
        </tr>
      </tbody>
    </table>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;color:#B7B6B8;font-size:10px;">
      <tbody>
        <tr height="100" style="background:#0A0C12;">
          <td></td>
        </tr>
        <tr height="5" style="background:#007AFF;">
          <td></td>
        </tr>
        <tr height="20">
          <td></td>
        </tr>
        <tr>
          <td>
            <p style="margin:0;">{{disclaimer.0}}</p>
            <p style="margin:0;">{{disclaimer.1}}</p>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
